<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="600" viewBox="0 0 1160 600" role="img" aria-labelledby="title desc">
  <title id="title">ALB target health check</title>
  <desc id="desc">Terminal-style capture showing ALB HTTP 200 and four healthy targets</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 16px Arial, sans-serif; fill: #5a6578; }
      .window { fill: #111827; stroke: #d6deeb; stroke-width: 2; }
      .bar { fill: #263244; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #febc2e; }
      .dot-green { fill: #28c840; }
      .terminal-title { font: 13px Arial, sans-serif; fill: #cfd8e3; }
      .prompt { font: 16px Menlo, Consolas, monospace; fill: #9ae6b4; }
      .text { font: 16px Menlo, Consolas, monospace; fill: #e5e7eb; }
      .success { fill: #eaf8f1; stroke: #39a66a; stroke-width: 2; }
      .success-text { font: 700 14px Arial, sans-serif; fill: #207849; }
      .muted { font: 14px Arial, sans-serif; fill: #65738a; }
    </style>
  </defs>
  <rect class="bg" width="1160" height="600"/>
  <text class="title" x="56" y="62">ALB / Target Group 확인</text>
  <text class="subtitle" x="56" y="92">ALB HTTP 응답과 대상 그룹 상태 확인</text>
  <rect class="success" x="56" y="118" width="178" height="34" rx="17"/>
  <text class="success-text" x="145" y="141" text-anchor="middle">SUCCESS</text>
  <rect class="window" x="56" y="178" width="1048" height="328" rx="14"/>
  <rect class="bar" x="56" y="178" width="1048" height="44" rx="14"/>
  <circle class="dot-red" cx="82" cy="200" r="7"/>
  <circle class="dot-yellow" cx="106" cy="200" r="7"/>
  <circle class="dot-green" cx="130" cy="200" r="7"/>
  <text class="terminal-title" x="580" y="205" text-anchor="middle">terminal - Lab3 ALB health test</text>
  <text class="prompt" x="88" y="258">$ curl -I http://my-alb-&lt;id&gt;.ap-northeast-2.elb.amazonaws.com/</text>
  <text class="text" x="88" y="288">HTTP/1.1 200 OK</text>
  <text class="prompt" x="88" y="330">$ aws elbv2 describe-target-health --target-group-arn webserver-tg</text>
  <text class="text" x="88" y="362">target            state     reason</text>
  <text class="text" x="88" y="392">asg-instance-01   healthy   None</text>
  <text class="text" x="88" y="422">asg-instance-02   healthy   None</text>
  <text class="text" x="88" y="452">asg-instance-03   healthy   None</text>
  <text class="text" x="88" y="482">asg-instance-04   healthy   None</text>
  <text class="muted" x="56" y="548">결과: ALB가 정상 응답했고, 대상 그룹의 ASG 웹 서버 4대가 healthy 상태입니다.</text>
</svg>
