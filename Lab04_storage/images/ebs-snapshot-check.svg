<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="660" viewBox="0 0 1160 660" role="img" aria-labelledby="title desc">
  <title id="title">EBS resize and snapshot check</title>
  <desc id="desc">Terminal-style capture showing EBS resize and snapshot restore verification</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 16px Arial, sans-serif; fill: #5a6578; }
      .window { fill: #111827; stroke: #d6deeb; stroke-width: 2; }
      .bar { fill: #263244; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #febc2e; }
      .dot-green { fill: #28c840; }
      .terminal-title { font: 13px Arial, sans-serif; fill: #cfd8e3; }
      .prompt { font: 16px Menlo, Consolas, monospace; fill: #9ae6b4; }
      .text { font: 16px Menlo, Consolas, monospace; fill: #e5e7eb; }
      .accent { font: 700 16px Menlo, Consolas, monospace; fill: #fbbf24; }
      .success { fill: #eaf8f1; stroke: #39a66a; stroke-width: 2; }
      .success-text { font: 700 14px Arial, sans-serif; fill: #207849; }
      .muted { font: 14px Arial, sans-serif; fill: #65738a; }
    </style>
  </defs>
  <rect class="bg" width="1160" height="660"/>
  <text class="title" x="56" y="62">EBS 볼륨 확장 / 스냅샷 복구 확인</text>
  <text class="subtitle" x="56" y="92">my-web01 데이터 볼륨을 확장하고 스냅샷으로 my-web02에서 복구</text>
  <rect class="success" x="56" y="118" width="178" height="34" rx="17"/>
  <text class="success-text" x="145" y="141" text-anchor="middle">SUCCESS</text>
  <rect class="window" x="56" y="178" width="1048" height="402" rx="14"/>
  <rect class="bar" x="56" y="178" width="1048" height="44" rx="14"/>
  <circle class="dot-red" cx="82" cy="200" r="7"/>
  <circle class="dot-yellow" cx="106" cy="200" r="7"/>
  <circle class="dot-green" cx="130" cy="200" r="7"/>
  <text class="terminal-title" x="580" y="205" text-anchor="middle">terminal - Lab4 EBS test</text>
  <text class="prompt" x="88" y="258">$ my-web01 /data01 after initial mount</text>
  <text class="text" x="88" y="288">/dev/nvme1n1p1  xfs  10G  /data01</text>
  <text class="prompt" x="88" y="330">$ after AWS volume resize and xfs_growfs</text>
  <text class="accent" x="88" y="360">/dev/nvme1n1p1  xfs  20G  /data01</text>
  <text class="prompt" x="88" y="402">$ snapshot restored volume mounted on my-web02</text>
  <text class="text" x="88" y="432">/dev/nvme1n1p1  xfs  20G  /dir1</text>
  <text class="text" x="88" y="472">Lab4 EBS test written from my-web01</text>
  <text class="text" x="88" y="502">Lab4 snapshot volume mounted on my-web02</text>
  <text class="muted" x="56" y="626">결과: EBS 확장과 스냅샷 기반 복구 볼륨의 데이터 확인이 모두 성공했습니다.</text>
</svg>
