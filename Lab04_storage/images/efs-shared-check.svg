<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="620" viewBox="0 0 1160 620" role="img" aria-labelledby="title desc">
  <title id="title">EFS shared file check</title>
  <desc id="desc">Terminal-style capture showing shared session log from two EC2 instances</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 16px Arial, sans-serif; fill: #5a6578; }
      .window { fill: #111827; stroke: #d6deeb; stroke-width: 2; }
      .bar { fill: #263244; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #febc2e; }
      .dot-green { fill: #28c840; }
      .terminal-title { font: 13px Arial, sans-serif; fill: #cfd8e3; }
      .prompt { font: 16px Menlo, Consolas, monospace; fill: #9ae6b4; }
      .text { font: 16px Menlo, Consolas, monospace; fill: #e5e7eb; }
      .success { fill: #eaf8f1; stroke: #39a66a; stroke-width: 2; }
      .success-text { font: 700 14px Arial, sans-serif; fill: #207849; }
      .muted { font: 14px Arial, sans-serif; fill: #65738a; }
    </style>
  </defs>
  <rect class="bg" width="1160" height="620"/>
  <text class="title" x="56" y="62">EFS 공유 파일시스템 확인</text>
  <text class="subtitle" x="56" y="92">두 EC2가 같은 EFS session.log를 읽고 쓰는지 확인</text>
  <rect class="success" x="56" y="118" width="178" height="34" rx="17"/>
  <text class="success-text" x="145" y="141" text-anchor="middle">SHARED</text>
  <rect class="window" x="56" y="178" width="1048" height="360" rx="14"/>
  <rect class="bar" x="56" y="178" width="1048" height="44" rx="14"/>
  <circle class="dot-red" cx="82" cy="200" r="7"/>
  <circle class="dot-yellow" cx="106" cy="200" r="7"/>
  <circle class="dot-green" cx="130" cy="200" r="7"/>
  <text class="terminal-title" x="580" y="205" text-anchor="middle">terminal - Lab4 EFS test</text>
  <text class="prompt" x="88" y="258">$ my-web01 df -Th /home/ubuntu/efs</text>
  <text class="text" x="88" y="288">nfs4  8.0E  /home/ubuntu/efs</text>
  <text class="prompt" x="88" y="330">$ my-web01 cat session.log</text>
  <text class="text" x="88" y="360">my-web02 logged in ...</text>
  <text class="text" x="88" y="390">my-web01 logged in ...</text>
  <text class="prompt" x="88" y="432">$ my-web02 cat session.log</text>
  <text class="text" x="88" y="462">my-web02 logged in ...</text>
  <text class="text" x="88" y="492">my-web01 logged in ...</text>
  <text class="muted" x="56" y="582">결과: 두 서버가 같은 EFS 파일을 공유하며 수정 내용을 서로 확인했습니다.</text>
</svg>
