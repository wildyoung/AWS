<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">인터넷 연결 전 VPC 아키텍처</title>
  <desc id="desc">인터넷 게이트웨이와 기본 라우트가 없는 VPC 내부 구성도</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 30px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 16px Arial, sans-serif; fill: #5b667a; }
      .label { font: 700 17px Arial, sans-serif; fill: #172033; }
      .small { font: 14px Arial, sans-serif; fill: #566176; }
      .tiny { font: 12px Arial, sans-serif; fill: #6a7284; }
      .box { fill: #ffffff; stroke: #d5ddeb; stroke-width: 2; }
      .vpc { fill: #eef5ff; stroke: #5a8bd8; stroke-width: 3; }
      .subnet { fill: #ffffff; stroke: #7ea7e8; stroke-width: 2; }
      .route { fill: #fff9e8; stroke: #d9a83a; stroke-width: 2; }
      .ec2 { fill: #fff3e4; stroke: #f59d2a; stroke-width: 2; }
      .sg { fill: #eaf8f1; stroke: #49a26d; stroke-width: 2; }
      .blocked { stroke: #d64545; stroke-width: 4; stroke-dasharray: 10 8; fill: none; marker-end: url(#arrow-red); }
      .line { stroke: #65738a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .local { stroke: #5a8bd8; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#65738a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a8bd8"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d64545"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="56" y="66">인터넷 연결 전 상태</text>
  <text class="subtitle" x="56" y="94">VPC 내부 구성은 완료되었지만 인터넷 게이트웨이와 0.0.0.0/0 라우트가 아직 없는 상태</text>

  <rect class="box" x="58" y="150" width="220" height="118" rx="14"/>
  <text class="label" x="168" y="192" text-anchor="middle">내 PC</text>
  <text class="small" x="168" y="220" text-anchor="middle">SSH 접속 시도</text>
  <text class="tiny" x="168" y="244" text-anchor="middle">퍼블릭 IP로 접속해도 timeout</text>

  <rect class="box" x="358" y="150" width="220" height="118" rx="14"/>
  <text class="label" x="468" y="195" text-anchor="middle">Internet</text>
  <text class="small" x="468" y="225" text-anchor="middle">외부 네트워크</text>

  <path class="line" d="M 278 209 L 350 209"/>
  <path class="blocked" d="M 578 209 C 646 209, 652 209, 716 209"/>
  <text class="small" x="646" y="185" text-anchor="middle" fill="#d64545">막힘</text>
  <text class="tiny" x="646" y="237" text-anchor="middle">IGW 라우트 없음</text>

  <rect class="vpc" x="720" y="124" width="500" height="550" rx="24"/>
  <text class="label" x="760" y="166">AWS VPC</text>
  <text class="small" x="760" y="192">my-vpc / 10.0.0.0/16 / ap-northeast-2</text>

  <rect class="route" x="760" y="224" width="420" height="78" rx="12"/>
  <text class="label" x="790" y="256">기본 라우팅 테이블</text>
  <text class="small" x="790" y="282">10.0.0.0/16 -> local</text>

  <rect class="subnet" x="760" y="340" width="190" height="250" rx="16"/>
  <text class="label" x="785" y="374">my-sub01</text>
  <text class="small" x="785" y="399">10.0.1.0/24</text>
  <text class="tiny" x="785" y="423">ap-northeast-2a</text>

  <rect class="ec2" x="790" y="455" width="130" height="48" rx="10"/>
  <text class="small" x="855" y="485" text-anchor="middle">my-vm01</text>
  <rect class="ec2" x="790" y="520" width="130" height="48" rx="10"/>
  <text class="small" x="855" y="550" text-anchor="middle">my-vm03</text>

  <rect class="subnet" x="990" y="340" width="190" height="250" rx="16"/>
  <text class="label" x="1015" y="374">my-sub02</text>
  <text class="small" x="1015" y="399">10.0.2.0/24</text>
  <text class="tiny" x="1015" y="423">ap-northeast-2c</text>

  <rect class="ec2" x="1020" y="486" width="130" height="48" rx="10"/>
  <text class="small" x="1085" y="516" text-anchor="middle">my-vm02</text>

  <rect class="sg" x="822" y="616" width="296" height="38" rx="10"/>
  <text class="small" x="970" y="641" text-anchor="middle">my-web-sg: SSH / HTTP / ICMP 허용</text>

  <path class="local" d="M 970 302 L 970 328"/>
  <path class="local" d="M 950 465 C 970 465, 970 510, 1014 510"/>
  <text class="tiny" x="970" y="458" text-anchor="middle">VPC 내부 통신은 local 경로 사용</text>

  <rect class="box" x="58" y="520" width="590" height="110" rx="16"/>
  <text class="label" x="90" y="555">이 단계에서 확인하는 것</text>
  <text class="small" x="90" y="586">퍼블릭 IP만으로는 퍼블릭 서버가 되지 않습니다.</text>
  <text class="small" x="90" y="616">인터넷 접속에는 Internet Gateway와 0.0.0.0/0 라우트가 필요합니다.</text>
</svg>
