<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">RDS Query Result</title>
  <desc id="desc">Sanitized MySQL query result from product.product_list on Amazon RDS</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #ffffff; stroke: #d8e0ee; stroke-width: 2; }
      .head { fill: #eef4ff; }
      .ok { fill: #ecfdf3; }
      .row { fill: #f8fafc; }
      .title { font: 700 30px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 15px Arial, sans-serif; fill: #536178; }
      .label { font: 700 15px Arial, sans-serif; fill: #172033; }
      .cell { font: 14px Arial, sans-serif; fill: #243044; }
      .mono { font: 13px Menlo, Consolas, monospace; fill: #243044; }
      .tiny { font: 12px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="56" y="62">RDS MySQL Query Result</text>
  <text class="subtitle" x="56" y="91">my-web01 connected to private rds01 and queried product.product_list</text>

  <rect class="panel" x="72" y="128" width="1136" height="432" rx="8"/>
  <rect class="ok" x="92" y="156" width="1096" height="70" rx="6"/>
  <text class="label" x="132" y="190">Connection</text>
  <text class="cell" x="320" y="190">OK</text>
  <text class="label" x="566" y="190">Database</text>
  <text class="cell" x="746" y="190">product</text>
  <text class="label" x="922" y="190">Table</text>
  <text class="cell" x="1010" y="190">product_list</text>

  <rect class="head" x="92" y="258" width="1096" height="48" rx="6"/>
  <text class="label" x="132" y="288">id</text>
  <text class="label" x="338" y="288">name</text>
  <text class="label" x="716" y="288">source</text>
  <text class="label" x="922" y="288">status</text>

  <rect class="row" x="92" y="320" width="1096" height="52" rx="6"/>
  <text class="cell" x="132" y="352">1</text>
  <text class="cell" x="338" y="352">Book Shelf</text>
  <text class="cell" x="716" y="352">RDS MySQL</text>
  <text class="cell" x="922" y="352">selected</text>

  <rect class="row" x="92" y="382" width="1096" height="52" rx="6"/>
  <text class="cell" x="132" y="414">2</text>
  <text class="cell" x="338" y="414">Chair</text>
  <text class="cell" x="716" y="414">RDS MySQL</text>
  <text class="cell" x="922" y="414">selected</text>

  <rect class="row" x="92" y="444" width="1096" height="52" rx="6"/>
  <text class="cell" x="132" y="476">3</text>
  <text class="cell" x="338" y="476">Pencil Holder</text>
  <text class="cell" x="716" y="476">RDS MySQL</text>
  <text class="cell" x="922" y="476">selected</text>

  <text class="mono" x="92" y="610">SELECT * FROM product.product_list ORDER BY id;</text>
  <text class="tiny" x="92" y="644">Endpoint and password were intentionally omitted from the repository.</text>
</svg>
