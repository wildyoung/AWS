<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Lab7 Cloud Security Architecture</title>
  <desc id="desc">IAM users, policies, EC2 instance profile, S3 private bucket, MFA, and CloudTrail security architecture</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 30px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 15px Arial, sans-serif; fill: #536178; }
      .zone { fill: #ffffff; stroke: #c8d4e8; stroke-width: 2; }
      .iam { fill: #eef4ff; stroke: #4e7bd9; stroke-width: 2; }
      .admin { fill: #f3edff; stroke: #8357d6; stroke-width: 2; }
      .ec2 { fill: #fff7ed; stroke: #f28c28; stroke-width: 2; }
      .s3 { fill: #ecfdf3; stroke: #30a46c; stroke-width: 2; }
      .audit { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; }
      .protect { fill: #fff1f2; stroke: #e05d6f; stroke-width: 2; }
      .label { font: 700 16px Arial, sans-serif; fill: #172033; }
      .small { font: 13px Arial, sans-serif; fill: #4f5d73; }
      .tiny { font: 12px Arial, sans-serif; fill: #64748b; }
      .arrow-blue { stroke: #4e7bd9; stroke-width: 4; fill: none; marker-end: url(#arrowBlue); }
      .arrow-green { stroke: #2f9e67; stroke-width: 4; fill: none; marker-end: url(#arrowGreen); }
      .arrow-purple { stroke: #8357d6; stroke-width: 4; fill: none; marker-end: url(#arrowPurple); }
      .arrow-gray { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#arrowGray); }
      .dash { stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4e7bd9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f9e67"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8357d6"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="56" y="62">Lab7 Cloud Security</text>
  <text class="subtitle" x="56" y="91">IAM least privilege, temporary credentials, S3 protection, and audit visibility</text>

  <rect class="zone" x="58" y="132" width="1128" height="510" rx="24"/>
  <text class="label" x="94" y="174">AWS Account</text>
  <text class="small" x="94" y="198">root user protected, daily work delegated to IAM identities</text>

  <rect class="iam" x="104" y="246" width="190" height="116" rx="16"/>
  <text class="label" x="199" y="286" text-anchor="middle">dev01</text>
  <text class="small" x="199" y="312" text-anchor="middle">AmazonEC2FullAccess</text>
  <text class="tiny" x="199" y="336" text-anchor="middle">S3 and IAM denied</text>

  <rect class="admin" x="104" y="438" width="190" height="116" rx="16"/>
  <text class="label" x="199" y="478" text-anchor="middle">my-admin</text>
  <text class="small" x="199" y="504" text-anchor="middle">AdministratorAccess</text>
  <text class="tiny" x="199" y="528" text-anchor="middle">no password or access key</text>

  <rect class="protect" x="360" y="246" width="190" height="116" rx="16"/>
  <text class="label" x="455" y="286" text-anchor="middle">MFA</text>
  <text class="small" x="455" y="312" text-anchor="middle">extra login factor</text>
  <text class="tiny" x="455" y="336" text-anchor="middle">manual phone setup</text>

  <rect class="ec2" x="624" y="214" width="226" height="116" rx="16"/>
  <text class="label" x="737" y="254" text-anchor="middle">my-web01</text>
  <text class="small" x="737" y="280" text-anchor="middle">EC2 instance</text>
  <text class="tiny" x="737" y="304" text-anchor="middle">uses instance profile</text>

  <rect class="ec2" x="624" y="368" width="226" height="116" rx="16"/>
  <text class="label" x="737" y="408" text-anchor="middle">my-web02</text>
  <text class="small" x="737" y="434" text-anchor="middle">EC2 instance</text>
  <text class="tiny" x="737" y="458" text-anchor="middle">uses instance profile</text>

  <rect class="iam" x="624" y="536" width="226" height="78" rx="16"/>
  <text class="label" x="737" y="570" text-anchor="middle">myS3AccessRole</text>
  <text class="small" x="737" y="594" text-anchor="middle">temporary credentials by STS</text>

  <rect class="s3" x="932" y="288" width="214" height="150" rx="16"/>
  <text class="label" x="1039" y="330" text-anchor="middle">Lab7 S3 bucket</text>
  <text class="small" x="1039" y="356" text-anchor="middle">private object storage</text>
  <text class="tiny" x="1039" y="382" text-anchor="middle">Block Public Access: on</text>
  <text class="tiny" x="1039" y="404" text-anchor="middle">SSE-S3 encryption: on</text>

  <rect class="audit" x="932" y="492" width="214" height="94" rx="16"/>
  <text class="label" x="1039" y="530" text-anchor="middle">CloudTrail</text>
  <text class="small" x="1039" y="556" text-anchor="middle">API activity history</text>

  <path class="arrow-blue" d="M294 304 L360 304"/>
  <path class="arrow-purple dash" d="M294 496 C340 478, 364 430, 410 360"/>
  <path class="arrow-green" d="M850 274 C896 288, 908 318, 932 342"/>
  <path class="arrow-green" d="M850 428 C894 416, 908 392, 932 374"/>
  <path class="arrow-blue" d="M737 536 L737 494"/>
  <path class="arrow-blue" d="M737 536 C700 514, 688 494, 688 484"/>
  <path class="arrow-gray dash" d="M850 576 C916 580, 954 566, 932 546"/>
  <path class="arrow-gray dash" d="M550 304 C660 144, 920 154, 1018 288"/>

  <text class="tiny" x="596" y="678">IAM users were created without console passwords or access keys. EC2 access uses temporary role credentials.</text>
</svg>
