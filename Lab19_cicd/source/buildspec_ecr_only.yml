version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-northeast-2
    IMAGE_REPO_NAME: lab19-to-do-app
    IMAGE_TAG: cli-lab

phases:
  pre_build:
    commands:
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - echo "Using IMAGE_REPO_NAME=$IMAGE_REPO_NAME"
      - echo "Using IMAGE_TAG=$IMAGE_TAG"
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
  build:
    commands:
      - echo "Build started"
      - "docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG ."
      - "docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG"
  post_build:
    commands:
      - "docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG"
      - "sed -i 's|image: .*to-do-app:.*|image: '$AWS_ACCOUNT_ID'.dkr.ecr.'$AWS_DEFAULT_REGION'.amazonaws.com/'$IMAGE_REPO_NAME':'$IMAGE_TAG'|g' to_do_app.yaml"
      - "printf 'imageUri=%s.dkr.ecr.%s.amazonaws.com/%s:%s\\n' \"$AWS_ACCOUNT_ID\" \"$AWS_DEFAULT_REGION\" \"$IMAGE_REPO_NAME\" \"$IMAGE_TAG\" > imageDetail.json"
      - cat imageDetail.json

artifacts:
  files:
    - to_do_app.yaml
    - imageDetail.json
