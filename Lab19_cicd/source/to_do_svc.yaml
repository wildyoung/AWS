apiVersion: v1
kind: Service
metadata:
  name: to-do-app-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: to-do-app
  ports:
    - protocol: TCP
      port: 8050
      targetPort: 5000
