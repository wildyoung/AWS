<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Lab13 Kubernetes Basic architecture</title>
  <desc id="desc">AWS CLI creates a VPC and an EC2 instance. k3s runs a single-node Kubernetes cluster. kubectl creates pods, deployments, namespaces, and a service.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#eef5f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#12364f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#426f82"/>
    </marker>
    <style>
      .title { font: 800 38px Arial, sans-serif; fill: #163142; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #4d6673; }
      .h { font: 800 19px Arial, sans-serif; fill: #163142; }
      .b { font: 500 15px Arial, sans-serif; fill: #425966; }
      .s { font: 700 13px Arial, sans-serif; fill: #ffffff; }
      .white { font: 800 17px Arial, sans-serif; fill: #ffffff; }
      .line { stroke: #426f82; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #91aeba; stroke-width: 2; fill: none; stroke-dasharray: 7 8; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="54" y="48" width="1172" height="624" rx="28" fill="#ffffff" stroke="#d6e6ed" filter="url(#shadow)"/>

  <text x="96" y="108" class="title">Lab13 Kubernetes Basic</text>
  <text x="96" y="142" class="subtitle">AWS CLI -> EC2 k3s -> kubectl -> Pod / Deployment / Namespace / Service</text>

  <g transform="translate(96 202)">
    <rect width="210" height="116" rx="16" fill="#255c73"/>
    <text x="24" y="39" class="white">AWS CLI</text>
    <text x="24" y="68" class="s">CloudFormation stack</text>
    <text x="24" y="92" class="s">SSM Run Command</text>
  </g>

  <path class="line" d="M318 260 H406"/>

  <g transform="translate(420 174)">
    <rect width="420" height="330" rx="22" fill="#f4f9fb" stroke="#b8d2dd" stroke-width="2"/>
    <text x="26" y="42" class="h">AWS VPC</text>
    <text x="26" y="70" class="b">Public subnet, Internet Gateway, no inbound SSH</text>

    <g transform="translate(34 104)">
      <rect width="352" height="190" rx="18" fill="#ffffff" stroke="#cfdee6"/>
      <text x="24" y="36" class="h">EC2: single k3s node</text>
      <text x="24" y="64" class="b">Amazon Linux 2023, t3.small</text>
      <text x="24" y="91" class="b">containerd runtime</text>

      <g transform="translate(22 118)">
        <rect width="142" height="44" rx="10" fill="#326a92"/>
        <text x="20" y="28" class="s">Control Plane</text>
      </g>
      <g transform="translate(184 118)">
        <rect width="142" height="44" rx="10" fill="#5d8a3b"/>
        <text x="28" y="28" class="s">Worker Node</text>
      </g>
    </g>
  </g>

  <path class="line" d="M840 260 H924"/>

  <g transform="translate(938 202)">
    <rect width="236" height="258" rx="18" fill="#f8fbfd" stroke="#bdd4df"/>
    <text x="24" y="42" class="h">kubectl Practice</text>

    <g transform="translate(24 72)">
      <rect width="188" height="38" rx="9" fill="#1f9dd8"/>
      <text x="18" y="25" class="s">get nodes / pods</text>
    </g>
    <g transform="translate(24 122)">
      <rect width="188" height="38" rx="9" fill="#b46b3c"/>
      <text x="18" y="25" class="s">run Pod</text>
    </g>
    <g transform="translate(24 172)">
      <rect width="188" height="38" rx="9" fill="#7f5ca8"/>
      <text x="18" y="25" class="s">Deployment 3 replicas</text>
    </g>
    <g transform="translate(24 222)">
      <rect width="188" height="38" rx="9" fill="#287d83"/>
      <text x="18" y="25" class="s">Namespace / Service</text>
    </g>
  </g>

  <path class="dash" d="M1036 472 V552 H194 V320"/>

  <g transform="translate(96 552)">
    <rect width="1078" height="58" rx="14" fill="#f1f7f9" stroke="#d2e3eb"/>
    <text x="24" y="36" class="b">After the captures are saved, the CloudFormation stack is deleted to avoid ongoing EC2 cost.</text>
  </g>
</svg>
