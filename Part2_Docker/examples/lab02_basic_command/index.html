<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docker Practice Page</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef7fc;
      color: #1f2933;
      font-family: Arial, sans-serif;
    }

    main {
      width: min(520px, calc(100% - 32px));
      padding: 44px 32px;
      text-align: center;
      background: #ffffff;
      border-top: 8px solid #2496ed;
      border-radius: 12px;
      box-shadow: 0 18px 45px rgba(23, 56, 78, 0.16);
    }

    img {
      width: 180px;
      max-width: 60%;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 12px;
      color: #2496ed;
      font-size: 32px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
    }

    strong {
      display: inline-block;
      margin-top: 28px;
      padding: 10px 20px;
      color: #ffffff;
      background: #2496ed;
      border-radius: 999px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <main>
    <img src="docker_logo.png" alt="Docker Logo">
    <h1>Docker 컨테이너 작동 중</h1>
    <p>이 페이지는 Docker 컨테이너 내부에서<br>성공적으로 호스팅되고 있습니다.</p>
    <strong>Status: Running</strong>
  </main>
</body>
</html>
