<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dockerfile Lab</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f9fb;
      color: #1d3442;
      font-family: Arial, sans-serif;
    }

    section {
      width: min(560px, calc(100% - 32px));
      padding: 40px 32px;
      background: white;
      border-left: 8px solid #2496ed;
      border-radius: 10px;
      box-shadow: 0 16px 36px rgba(25, 64, 86, 0.14);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      color: #2496ed;
    }

    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <section>
    <h1>Dockerfile Build Success</h1>
    <p>이 페이지는 Dockerfile로 빌드한 Nginx 이미지에서 제공됩니다.</p>
  </section>
</body>
</html>
