<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Docker learning path</title>
  <desc id="desc">Cloud native concepts, Docker engine, container lifecycle, network and volume, Dockerfile, image registry, and Docker Compose learning flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#eef6fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#12364f" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#417489"/>
    </marker>
    <style>
      .title { font: 800 38px Arial, sans-serif; fill: #183446; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #4d6a79; }
      .section { font: 800 18px Arial, sans-serif; fill: #183446; }
      .body { font: 500 14px Arial, sans-serif; fill: #425b67; }
      .small { font: 700 13px Arial, sans-serif; fill: #ffffff; }
      .num { font: 900 22px Arial, sans-serif; fill: #ffffff; }
      .label { font: 800 15px Arial, sans-serif; fill: #183446; }
      .line { stroke: #417489; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .mutedline { stroke: #98b7c5; stroke-width: 2; fill: none; stroke-dasharray: 6 8; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="54" y="54" width="1172" height="612" rx="28" fill="#ffffff" stroke="#d7e8ef" filter="url(#shadow)"/>

  <text x="96" y="112" class="title">Part 2 Docker Study</text>
  <text x="96" y="146" class="subtitle">Cloud Native -> Container -> Docker Engine -> Image -> Network/Volume -> Compose</text>

  <g transform="translate(94 202)">
    <rect width="154" height="150" rx="16" fill="#1f9dd8"/>
    <circle cx="32" cy="36" r="18" fill="#f4fbff" opacity="0.22"/>
    <text x="24" y="44" class="num">1</text>
    <text x="24" y="82" class="small">Cloud Native</text>
    <text x="24" y="109" class="small">MSA</text>
    <text x="24" y="132" class="small">DevOps / CI-CD</text>
  </g>

  <path class="line" d="M263 277 H332"/>

  <g transform="translate(346 202)">
    <rect width="154" height="150" rx="16" fill="#315a70"/>
    <circle cx="32" cy="36" r="18" fill="#f4fbff" opacity="0.20"/>
    <text x="24" y="44" class="num">2</text>
    <text x="24" y="82" class="small">Container</text>
    <text x="24" y="109" class="small">Image</text>
    <text x="24" y="132" class="small">Docker Engine</text>
  </g>

  <path class="line" d="M515 277 H584"/>

  <g transform="translate(598 202)">
    <rect width="154" height="150" rx="16" fill="#5d8a3b"/>
    <circle cx="32" cy="36" r="18" fill="#f4fbff" opacity="0.22"/>
    <text x="24" y="44" class="num">3</text>
    <text x="24" y="82" class="small">Docker CLI</text>
    <text x="24" y="109" class="small">run / ps / exec</text>
    <text x="24" y="132" class="small">logs / inspect</text>
  </g>

  <path class="line" d="M767 277 H836"/>

  <g transform="translate(850 202)">
    <rect width="154" height="150" rx="16" fill="#b46b3c"/>
    <circle cx="32" cy="36" r="18" fill="#f4fbff" opacity="0.22"/>
    <text x="24" y="44" class="num">4</text>
    <text x="24" y="82" class="small">Network</text>
    <text x="24" y="109" class="small">Volume</text>
    <text x="24" y="132" class="small">Persistence</text>
  </g>

  <path class="line" d="M1004 277 H1068 V412 H972"/>

  <g transform="translate(818 388)">
    <rect width="154" height="150" rx="16" fill="#7f5ca8"/>
    <circle cx="32" cy="36" r="18" fill="#f4fbff" opacity="0.22"/>
    <text x="24" y="44" class="num">5</text>
    <text x="24" y="82" class="small">Dockerfile</text>
    <text x="24" y="109" class="small">Build</text>
    <text x="24" y="132" class="small">ENV / CMD</text>
  </g>

  <path class="line" d="M804 463 H735"/>

  <g transform="translate(566 388)">
    <rect width="154" height="150" rx="16" fill="#287d83"/>
    <circle cx="32" cy="36" r="18" fill="#f4fbff" opacity="0.22"/>
    <text x="24" y="44" class="num">6</text>
    <text x="24" y="82" class="small">Image Layers</text>
    <text x="24" y="109" class="small">Registry</text>
    <text x="24" y="132" class="small">Docker Hub / ECR</text>
  </g>

  <path class="line" d="M552 463 H483"/>

  <g transform="translate(314 388)">
    <rect width="154" height="150" rx="16" fill="#bf4f62"/>
    <circle cx="32" cy="36" r="18" fill="#f4fbff" opacity="0.22"/>
    <text x="24" y="44" class="num">7</text>
    <text x="24" y="82" class="small">Compose</text>
    <text x="24" y="109" class="small">Multi-container</text>
    <text x="24" y="132" class="small">WordPress + DB</text>
  </g>

  <g transform="translate(1018 420)">
    <rect width="128" height="78" rx="12" fill="#edf6fa" stroke="#c6dce6"/>
    <text x="20" y="31" class="label">AWS CLI</text>
    <text x="20" y="55" class="body">CFN / ECR</text>
  </g>

  <path class="mutedline" d="M1018 460 H972"/>
  <path class="mutedline" d="M1018 474 H720"/>

  <g transform="translate(94 582)">
    <rect width="1092" height="44" rx="12" fill="#f3f8fa" stroke="#d7e8ef"/>
    <text x="24" y="28" class="body">Practice mode: Docker commands are documented as reproducible labs. AWS resources are not created unless explicitly needed.</text>
  </g>
</svg>
