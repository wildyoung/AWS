<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Lab16 Kubernetes Network Architecture</title>
  <desc id="desc">Single-node k3s Kubernetes network lab with Pod networking, Service, LoadBalancer, and Ingress.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .aws { fill: #fff7ed; stroke: #fb923c; stroke-width: 2.5; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .cluster { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2.5; }
      .pod { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; }
      .svc { fill: #f8fafc; stroke: #64748b; stroke-width: 2; }
      .lb { fill: #fefce8; stroke: #eab308; stroke-width: 2; }
      .ing { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .ext { fill: #fdf2f8; stroke: #ec4899; stroke-width: 2; }
      .title { font: 700 36px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 19px Arial, sans-serif; fill: #475569; }
      .h { font: 700 23px Arial, sans-serif; fill: #0f172a; }
      .b { font: 500 16px Arial, sans-serif; fill: #334155; }
      .s { font: 500 14px Arial, sans-serif; fill: #64748b; }
      .code { font: 600 15px "SFMono-Regular", Consolas, monospace; fill: #1e293b; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="920"/>
  <text x="70" y="70" class="title">Lab16 Kubernetes Network</text>
  <text x="70" y="106" class="subtitle">Pod IP, Service, Endpoints, LoadBalancer, Ingress 흐름을 k3s 단일 노드에서 확인합니다.</text>

  <rect x="70" y="145" width="1460" height="705" rx="26" class="aws"/>
  <text x="105" y="190" class="h">AWS 임시 실습 환경</text>
  <text x="105" y="222" class="s">CloudFormation 단일 EC2 + SSM + k3s, 외부 접속 확인 후 스택 삭제</text>

  <rect x="115" y="300" width="350" height="390" rx="18" class="node"/>
  <text x="145" y="342" class="h">EC2 k3s Node</text>
  <text x="145" y="380" class="b">Traefik Ingress Controller</text>
  <text x="145" y="410" class="b">ServiceLB / kube-proxy</text>
  <text x="145" y="440" class="code">Pod CIDR 10.42.0.0/16</text>
  <text x="145" y="470" class="code">Service CIDR 10.43.0.0/16</text>

  <rect x="525" y="250" width="705" height="540" rx="24" class="cluster"/>
  <text x="565" y="294" class="h">Kubernetes Cluster</text>
  <text x="565" y="326" class="s">Service는 label selector로 Pod IP를 Endpoints에 연결합니다.</text>

  <rect x="585" y="395" width="190" height="105" rx="14" class="pod"/>
  <text x="612" y="432" class="h">Pods</text>
  <text x="612" y="463" class="s">single / multi</text>
  <text x="612" y="486" class="s">Pod-to-Pod ping</text>

  <rect x="855" y="395" width="220" height="105" rx="14" class="svc"/>
  <text x="882" y="432" class="h">Service</text>
  <text x="882" y="463" class="s">ClusterIP</text>
  <text x="882" y="486" class="s">Endpoints 자동 추적</text>

  <rect x="585" y="610" width="240" height="105" rx="14" class="lb"/>
  <text x="612" y="647" class="h">LoadBalancer</text>
  <text x="612" y="678" class="s">k3s ServiceLB</text>
  <text x="612" y="701" class="s">8020 / 8050</text>

  <rect x="935" y="610" width="240" height="105" rx="14" class="ing"/>
  <text x="962" y="647" class="h">Ingress</text>
  <text x="962" y="678" class="s">Traefik path routing</text>
  <text x="962" y="701" class="s">/hello, /world</text>

  <rect x="1300" y="530" width="180" height="170" rx="18" class="ext"/>
  <text x="1325" y="572" class="h">External</text>
  <text x="1325" y="604" class="h">Client</text>
  <text x="1325" y="641" class="s">Public IP</text>
  <text x="1325" y="664" class="s">HTTP curl</text>

  <path class="arrow" d="M 465 495 L 580 448"/>
  <path class="arrow" d="M 775 448 L 850 448"/>
</svg>
