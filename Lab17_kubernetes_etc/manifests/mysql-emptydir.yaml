apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-emptydir
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-emptydir
  template:
    metadata:
      labels:
        app: mysql-emptydir
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "1234"
            - name: MYSQL_DATABASE
              value: demodb
            - name: MYSQL_USER
              value: demo
            - name: MYSQL_PASSWORD
              value: "1234"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1", "-p1234"]
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: mysql-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-emptydir
spec:
  selector:
    app: mysql-emptydir
  ports:
    - port: 3306
      targetPort: 3306
