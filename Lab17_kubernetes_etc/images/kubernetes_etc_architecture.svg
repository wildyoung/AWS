<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="980" viewBox="0 0 1700 980" role="img" aria-labelledby="title desc">
  <title id="title">Lab17 Kubernetes Etc Architecture</title>
  <desc id="desc">Single-node k3s lab for emptyDir, PersistentVolume, PersistentVolumeClaim, ConfigMap, and Secret.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .aws { fill: #fff7ed; stroke: #fb923c; stroke-width: 2.5; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .cluster { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2.5; }
      .tmp { fill: #fefce8; stroke: #eab308; stroke-width: 2; }
      .pv { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; }
      .cm { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .secret { fill: #fdf2f8; stroke: #ec4899; stroke-width: 2; }
      .pod { fill: #f8fafc; stroke: #64748b; stroke-width: 2; }
      .title { font: 700 36px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 19px Arial, sans-serif; fill: #475569; }
      .h { font: 700 23px Arial, sans-serif; fill: #0f172a; }
      .b { font: 500 16px Arial, sans-serif; fill: #334155; }
      .s { font: 500 14px Arial, sans-serif; fill: #64748b; }
      .code { font: 600 15px "SFMono-Regular", Consolas, monospace; fill: #1e293b; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" width="1700" height="980"/>
  <text x="70" y="70" class="title">Lab17 Kubernetes Etc</text>
  <text x="70" y="106" class="subtitle">Volume, PV/PVC, ConfigMap, Secret으로 상태와 설정을 분리합니다.</text>

  <rect x="70" y="145" width="1560" height="765" rx="26" class="aws"/>
  <text x="105" y="190" class="h">AWS 임시 실습 환경</text>
  <text x="105" y="222" class="s">CloudFormation 단일 EC2 + SSM + k3s, MySQL 실습 후 스택 삭제</text>

  <rect x="115" y="315" width="360" height="405" rx="18" class="node"/>
  <text x="145" y="342" class="h">EC2 k3s Node</text>
  <text x="145" y="380" class="b">hostPath /home/ec2-user/data</text>
  <text x="145" y="410" class="b">local-path StorageClass</text>
  <text x="145" y="440" class="b">MySQL image pull</text>
  <text x="145" y="470" class="b">SSM Run Command</text>

  <rect x="545" y="250" width="760" height="590" rx="24" class="cluster"/>
  <text x="585" y="294" class="h">Kubernetes Etc Objects</text>
  <text x="585" y="326" class="s">데이터와 설정을 Pod 스펙에서 분리해 관리합니다.</text>

  <rect x="605" y="395" width="245" height="125" rx="14" class="tmp"/>
  <text x="632" y="434" class="h">emptyDir</text>
  <text x="632" y="468" class="s">Pod 삭제 시 데이터 삭제</text>
  <text x="632" y="496" class="s">Pod 수명과 함께 사라짐</text>

  <rect x="930" y="395" width="245" height="125" rx="14" class="pv"/>
  <text x="957" y="434" class="h">PV / PVC</text>
  <text x="957" y="468" class="s">Pod 재생성 후 데이터 유지</text>
  <text x="957" y="496" class="s">Retain reclaim policy</text>

  <rect x="605" y="640" width="245" height="125" rx="14" class="cm"/>
  <text x="632" y="679" class="h">ConfigMap</text>
  <text x="632" y="713" class="s">비밀번호 외 설정 분리</text>
  <text x="632" y="741" class="s">envFrom 주입</text>

  <rect x="930" y="640" width="245" height="125" rx="14" class="secret"/>
  <text x="957" y="679" class="h">Secret</text>
  <text x="957" y="713" class="s">민감값 분리</text>
  <text x="957" y="741" class="s">base64 data 확인</text>

  <rect x="1360" y="455" width="220" height="190" rx="18" class="pod"/>
  <text x="1390" y="500" class="h">MySQL Pod</text>
  <text x="1390" y="540" class="s">/var/lib/mysql mount</text>
  <text x="1390" y="568" class="s">환경 변수 주입</text>
  <text x="1390" y="596" class="s">demo DB 생성/조회</text>

  <path class="arrow" d="M 475 520 L 540 520"/>
  <text x="485" y="505" class="s">kubectl apply</text>
  <path class="arrow" d="M 1305 550 L 1355 550"/>
  <text x="1320" y="535" class="s">mount / env</text>
</svg>
