    <title>Lab6 Domain and Traffic</title>
    <style>
      :root {

        margin: 0;
        min-height: 100vh;

      }
      .badge {
        display: inline-block;
        margin-bottom: 20px;
        padding: 6px 10px;

        color: #166534;
        font-weight: 700;
        font-size: 13px;

    <main>
      <div class="badge">S3 Static Website</div>
