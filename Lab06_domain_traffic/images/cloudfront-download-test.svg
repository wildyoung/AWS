<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">CloudFront Download Test Result</title>
  <desc id="desc">Download time comparison between direct S3 and CloudFront cache hit from two EC2 instances</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #ffffff; stroke: #d8e0ee; stroke-width: 2; }
      .head { fill: #eef4ff; }
      .hit { fill: #ecfdf3; }
      .miss { fill: #fff7ed; }
      .direct { fill: #f8fafc; }
      .title { font: 700 30px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 15px Arial, sans-serif; fill: #536178; }
      .label { font: 700 15px Arial, sans-serif; fill: #172033; }
      .cell { font: 14px Arial, sans-serif; fill: #243044; }
      .tiny { font: 12px Arial, sans-serif; fill: #64748b; }
      .line { stroke: #d8e0ee; stroke-width: 1; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="56" y="62">CloudFront Download Test</text>
  <text class="subtitle" x="56" y="91">32MiB object downloaded from EC2 instances in Seoul</text>

  <rect class="panel" x="72" y="128" width="1136" height="440" rx="8"/>
  <rect class="head" x="92" y="156" width="1096" height="48" rx="6"/>
  <text class="label" x="132" y="186">Source</text>
  <text class="label" x="318" y="186">Path</text>
  <text class="label" x="566" y="186">X-Cache</text>
  <text class="label" x="760" y="186">Total Time</text>
  <text class="label" x="956" y="186">Speed</text>

  <rect class="direct" x="92" y="218" width="1096" height="58" rx="6"/>
  <text class="cell" x="132" y="253">my-web01</text>
  <text class="cell" x="318" y="253">Direct S3</text>
  <text class="cell" x="566" y="253">N/A</text>
  <text class="cell" x="760" y="253">4.446 s</text>
  <text class="cell" x="956" y="253">7.20 MiB/s</text>

  <rect class="miss" x="92" y="286" width="1096" height="58" rx="6"/>
  <text class="cell" x="132" y="321">my-web01</text>
  <text class="cell" x="318" y="321">CloudFront first</text>
  <text class="cell" x="566" y="321">Miss</text>
  <text class="cell" x="760" y="321">3.908 s</text>
  <text class="cell" x="956" y="321">8.19 MiB/s</text>

  <rect class="hit" x="92" y="354" width="1096" height="58" rx="6"/>
  <text class="cell" x="132" y="389">my-web01</text>
  <text class="cell" x="318" y="389">CloudFront second</text>
  <text class="cell" x="566" y="389">Hit</text>
  <text class="cell" x="760" y="389">0.129 s</text>
  <text class="cell" x="956" y="389">248.62 MiB/s</text>

  <rect class="direct" x="92" y="422" width="1096" height="58" rx="6"/>
  <text class="cell" x="132" y="457">my-web02</text>
  <text class="cell" x="318" y="457">Direct S3</text>
  <text class="cell" x="566" y="457">N/A</text>
  <text class="cell" x="760" y="457">4.701 s</text>
  <text class="cell" x="956" y="457">6.81 MiB/s</text>

  <rect class="hit" x="92" y="490" width="1096" height="58" rx="6"/>
  <text class="cell" x="132" y="525">my-web02</text>
  <text class="cell" x="318" y="525">CloudFront first</text>
  <text class="cell" x="566" y="525">Hit</text>
  <text class="cell" x="760" y="525">0.146 s</text>
  <text class="cell" x="956" y="525">218.58 MiB/s</text>

  <text class="tiny" x="92" y="612">CloudFront first request from my-web01 populated the edge cache. Later CloudFront requests were served as cache hits.</text>
</svg>
