<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="620" viewBox="0 0 1160 620" role="img" aria-labelledby="title desc">
  <title id="title">Private subnet route check</title>
  <desc id="desc">Terminal-style capture showing private subnet ping success after main route table update</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 16px Arial, sans-serif; fill: #5a6578; }
      .window { fill: #111827; stroke: #d6deeb; stroke-width: 2; }
      .bar { fill: #263244; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #febc2e; }
      .dot-green { fill: #28c840; }
      .terminal-title { font: 13px Arial, sans-serif; fill: #cfd8e3; }
      .prompt { font: 16px Menlo, Consolas, monospace; fill: #9ae6b4; }
      .text { font: 16px Menlo, Consolas, monospace; fill: #e5e7eb; }
      .accent { font: 700 16px Menlo, Consolas, monospace; fill: #fbbf24; }
      .success { fill: #eaf8f1; stroke: #39a66a; stroke-width: 2; }
      .success-text { font: 700 14px Arial, sans-serif; fill: #207849; }
      .muted { font: 14px Arial, sans-serif; fill: #65738a; }
    </style>
  </defs>
  <rect class="bg" width="1160" height="620"/>
  <text class="title" x="56" y="62">프라이빗 서브넷 라우팅 확인</text>
  <text class="subtitle" x="56" y="92">tk-sub02가 사용하는 기본 라우팅 테이블에도 peering route 추가</text>
  <rect class="success" x="56" y="118" width="178" height="34" rx="17"/>
  <text class="success-text" x="145" y="141" text-anchor="middle">ROUTE OK</text>
  <rect class="window" x="56" y="178" width="1048" height="360" rx="14"/>
  <rect class="bar" x="56" y="178" width="1048" height="44" rx="14"/>
  <circle class="dot-red" cx="82" cy="200" r="7"/>
  <circle class="dot-yellow" cx="106" cy="200" r="7"/>
  <circle class="dot-green" cx="130" cy="200" r="7"/>
  <text class="terminal-title" x="580" y="205" text-anchor="middle">terminal - Lab5 private subnet route test</text>
  <text class="prompt" x="88" y="258">$ add route to Tokyo main route table</text>
  <text class="text" x="88" y="288">10.0.0.0/16 -> VPC Peering</text>
  <text class="prompt" x="88" y="330">$ my-web01 -> tk-web01 private IP</text>
  <text class="accent" x="88" y="360">3 packets transmitted, 3 received, 0% packet loss</text>
  <text class="prompt" x="88" y="402">$ my-web01 -> tk-web02 private IP</text>
  <text class="accent" x="88" y="432">3 packets transmitted, 3 received, 0% packet loss</text>
  <text class="text" x="88" y="484">private_subnet_result=success</text>
  <text class="muted" x="56" y="582">결과: 대상 EC2가 속한 서브넷의 라우팅 테이블까지 수정해야 피어링 통신이 성공합니다.</text>
</svg>
