<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="620" viewBox="0 0 1160 620" role="img" aria-labelledby="title desc">
  <title id="title">Before peering ping test</title>
  <desc id="desc">Terminal-style capture showing public ping success and private ping failure before VPC peering</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 16px Arial, sans-serif; fill: #5a6578; }
      .window { fill: #111827; stroke: #d6deeb; stroke-width: 2; }
      .bar { fill: #263244; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #febc2e; }
      .dot-green { fill: #28c840; }
      .terminal-title { font: 13px Arial, sans-serif; fill: #cfd8e3; }
      .prompt { font: 16px Menlo, Consolas, monospace; fill: #9ae6b4; }
      .text { font: 16px Menlo, Consolas, monospace; fill: #e5e7eb; }
      .accent { font: 700 16px Menlo, Consolas, monospace; fill: #fbbf24; }
      .fail { font: 700 16px Menlo, Consolas, monospace; fill: #f87171; }
      .success { fill: #eaf8f1; stroke: #39a66a; stroke-width: 2; }
      .success-text { font: 700 14px Arial, sans-serif; fill: #207849; }
      .muted { font: 14px Arial, sans-serif; fill: #65738a; }
    </style>
  </defs>
  <rect class="bg" width="1160" height="620"/>
  <text class="title" x="56" y="62">피어링 전 Ping 테스트</text>
  <text class="subtitle" x="56" y="92">인터넷 경로와 프라이빗 경로의 차이 확인</text>
  <rect class="success" x="56" y="118" width="210" height="34" rx="17"/>
  <text class="success-text" x="161" y="141" text-anchor="middle">EXPECTED RESULT</text>
  <rect class="window" x="56" y="178" width="1048" height="360" rx="14"/>
  <rect class="bar" x="56" y="178" width="1048" height="44" rx="14"/>
  <circle class="dot-red" cx="82" cy="200" r="7"/>
  <circle class="dot-yellow" cx="106" cy="200" r="7"/>
  <circle class="dot-green" cx="130" cy="200" r="7"/>
  <text class="terminal-title" x="580" y="205" text-anchor="middle">terminal - Lab5 before VPC peering</text>
  <text class="prompt" x="88" y="258">$ my-web01 -> tk-web01 public IP</text>
  <text class="accent" x="88" y="288">3 packets transmitted, 3 received, 0% packet loss</text>
  <text class="prompt" x="88" y="330">$ my-web01 -> tk-web01 private IP</text>
  <text class="fail" x="88" y="360">3 packets transmitted, 0 received, 100% packet loss</text>
  <text class="prompt" x="88" y="402">$ my-web01 -> tk-web02 private IP</text>
  <text class="fail" x="88" y="432">3 packets transmitted, 0 received, 100% packet loss</text>
  <text class="text" x="88" y="484">public_result=success  private_result=fail</text>
  <text class="muted" x="56" y="582">결과: 피어링 전에는 인터넷 경로인 public IP만 성공하고 private IP 통신은 실패했습니다.</text>
</svg>
